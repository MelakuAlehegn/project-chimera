name: Chimera CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Maven cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Setup project (resolve dependencies, skip tests)
        run: make setup

      - name: Lint check
        run: make lint

      - name: Run unit tests
        # Placeholder env vars so Config.load() succeeds in unit tests.
        # No real services are called -- integration tests are skipped.
        env:
          GEMINI_API_KEY: ci-placeholder
          DATABASE_URL: jdbc:postgresql://localhost:5432/none
          DATABASE_USER: none
          DATABASE_PASSWORD: none
          BLUESKY_HANDLE: none
          BLUESKY_APP_PASSWORD: none
        run: make test-unit

